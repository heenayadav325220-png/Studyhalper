name: Android Build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 🛠️ पीली वार्निंग पूरी तरह खत्म (Node 24 कम्पेटिबल)
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 🛠️ जावा फिक्स: कैपेसिटर 8 और ग्रैडल 8.14 के लिए JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 🛠️ ग्रैडल फिक्स: यह सीधे तुम्हारी 'gradle-wrapper.properties' फ़ाइल से 8.14.3 वर्शन उठाएगा
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # 🛠️ पाथ फिक्स: कीस्टोर सीधे 'android/app' फोल्डर के अंदर
      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore release.keystore -alias ascend_study -keyalg RSA -keysize 2048 -validity 10000 -storepass "ascendstudy123" -keypass "ascendstudy123" -dname "CN=ascendstudy.com, OU=Ascend Study, O=Ascend, L=Unknown, S=Unknown, C=US"

      # 🛠️ क्लीन बिल्ड: तुम्हारे असली ग्रैडल इंजन के साथ फ्रेश कंपाइलेशन
      - name: Build Android App
        run: |
          cd android
          ./gradlew clean assembleDebug assembleRelease --no-daemon

      # 🛠️ एपीके साइनिंग: बिना किसी पाथ एरर के सीधे अलाइन करना
      - name: Sign Release APK
        run: |
          export APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          echo "Using apksigner at $APKSIGNER"
          
          $APKSIGNER sign --ks android/app/release.keystore --ks-pass pass:ascendstudy123 --key-pass pass:ascendstudy123 --out android/app/build/outputs/apk/release/ASCEND_STUDY-release-signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk
          
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ASCEND_STUDY-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND_STUDY-debug-apk
          path: android/app/build/outputs/apk/debug/ASCEND_STUDY-debug.apk

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND_STUDY-release-apk
          path: android/app/build/outputs/apk/release/ASCEND_STUDY-release-signed.apk

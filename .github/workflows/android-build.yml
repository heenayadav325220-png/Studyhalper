name: Android Build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 🛠️ ग्रैडल को क्लाउड पर सही ढंग से सेटअप करना और सुरक्षा बाईपास ऑन रखना
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          validate-wrappers: false

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # 🛠️ कीस्टोर को सही 'android' फ़ोल्डर के अंदर बनाना ताकि ग्रैडल उसे एक्सेस कर सके
      - name: Generate Keystore
        run: |
          cd android
          keytool -genkey -v -keystore release.keystore -alias ascend_study -keyalg RSA -keysize 2048 -validity 10000 -storepass "ascendstudy123" -keypass "ascendstudy123" -dname "CN=ascendstudy.com, OU=Ascend Study, O=Ascend, L=Unknown, S=Unknown, C=US"

      # 🛠️ एंड्रॉइड फ़ोल्डर में जाकर सीधे ग्रैडल के माध्यम से क्लीन बिल्ड तैयार करना
      - name: Build Android App
        run: |
          cd android
          gradle assembleDebug
          gradle assembleRelease

      # 🛠️ साइनिंग पाथ को पूरी तरह फिक्स किया गया ताकि मिसिंग फ़ाइल का एरर न आए
      - name: Sign Release APK
        run: |
          export APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          echo "Using apksigner at $APKSIGNER"
          
          # सही पाथ पर जाकर एपीके को साइन करना
          $APKSIGNER sign --ks android/release.keystore --ks-pass pass:ascendstudy123 --key-pass pass:ascendstudy123 --out android/app/build/outputs/apk/release/ASCEND_STUDY-release-signed.apk android/app/build/outputs/apk/release/app-release-unsigned.apk
          
          # क्लीन नेमिंग के लिए कॉपी करना
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ASCEND_STUDY-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND_STUDY-debug-apk
          path: android/app/build/outputs/apk/debug/ASCEND_STUDY-debug.apk

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ASCEND_STUDY-release-apk
          path: android/app/build/outputs/apk/release/ASCEND_STUDY-release-signed.apk
